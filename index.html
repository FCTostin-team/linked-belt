<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCT-Team Code Generator (Factorio Style)</title>
    <link rel="icon" href="https://i.ibb.co/QJD5Qsp/linked-belt16-16.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="language-control">
        <select id="lang-select" class="lang-dropdown" aria-label="Выбор языка">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="uk">Українська</option>
            <option value="kk">Қазақша</option>
            <option value="cs">Čeština</option>
            <option value="nl">Nederlands</option>
            <option value="sv">Svenska</option>
            <option value="de">Deutsch</option>
            <option value="pl">Polski</option>
            <option value="fr">Français</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <h1 id="app-title">Linked-Belt By FCT-team</h1>

    <div class="block">
        <div class="control-row">
            <img src="https://i.ibb.co/TkvMNSL/linkbelt2.png" class="belt-image belt-image-sm" alt="Linked belt input" />
            <label for="nameInput1" id="label-input">Конвейер погрузки:</label>
            <input type="text" id="nameInput1" placeholder="1-Тег конвейера" />
            <button id="copyButton1">Скопировать</button>
            <span class="copy-feedback">скопировано</span>
        </div>
        <textarea id="codeArea1" readonly></textarea>
    </div>

    <div class="block">
        <div class="control-row">
            <img src="https://i.ibb.co/WpWXL1g/linkbelt1.png" class="belt-image belt-image-sm" alt="Linked belt output" />
            <label for="nameInput2" id="label-output">Конвейер разгрузки:</label>
            <input type="text" id="nameInput2" placeholder="2-Тег конвейера" />
            <button id="copyButton2">Скопировать</button>
            <span class="copy-feedback">скопировано</span>
        </div>
        <textarea id="codeArea2" readonly></textarea>
    </div>

    <div class="block">
        <div class="control-row">
            <img src="https://i.ibb.co/tqGNcfX/linkbelt3.png" class="belt-image belt-image-md" alt="Linked belt combined code" />
            <label for="nameInput3" id="label-combined">Код объединения конвейеров:</label>
            <button id="copyButton3" class="button-push-right">Скопировать</button>
            <span class="copy-feedback">скопировано</span>
        </div>
        <textarea id="codeArea3" class="code-area-combined" readonly></textarea>
    </div>

    <p class="guide"><span id="guide-label">Руководство:</span> <a id="guide-link" href="https://steamcommunity.com/sharedfiles/filedetails/?id=3392327413" target="_blank">Как настроить Связанные конвейеры</a></p>

    <div class="footer footer-meta">
        <p>
            <a href="https://www.youtube.com/@FCT-Ostin" target="_blank">YouTube</a> |
            <a href="https://t.me/FCTostin" target="_blank">Telegram</a> |
            <a id="steam-group-link" href="https://steamcommunity.com/groups/FCTgroup" target="_blank">Steam Группа</a> |
            <a href="https://www.patreon.com/c/OstinFCT" target="_blank">Patreon</a> |
            <a href="https://boosty.to/ostinfct" target="_blank">Boosty</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
